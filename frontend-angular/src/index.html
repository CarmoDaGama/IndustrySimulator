<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <title>IndustrySimulator v2 | Gestão Industrial 4.0</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Simulador de produção industrial avançado com Kafka e Microsserviços" />
    <meta name="theme-color" content="#1a1c2e" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <script>
      if (typeof global === 'undefined') {
        var global = window;
      }
    </script>
    <style>
      :root {
        --bg-color: #0f172a;
        --accent-color: #6366f1;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: var(--bg-color);
        color: white;
        overflow-x: hidden;
      }

      app-root {
        display: block;
        width: 100%;
        height: 100%;
      }

      /* Premium Loading Spinner */
      .loading-container {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
      }

      .loader {
        position: relative;
        width: 120px;
        height: 120px;
      }

      .loader-circle {
        position: absolute;
        width: 100%;
        height: 100%;
        border-radius: 50%;
        border: 4px solid transparent;
        border-top-color: var(--accent-color);
        animation: spin 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
      }

      .loader-circle-inner {
        position: absolute;
        top: 15px;
        left: 15px;
        right: 15px;
        bottom: 15px;
        border-radius: 50%;
        border: 4px solid transparent;
        border-top-color: #94a3b8;
        animation: spin 2s linear infinite reverse;
      }

      .loader-text {
        margin-top: 2rem;
        font-weight: 600;
        letter-spacing: 0.1rem;
        color: #94a3b8;
        text-transform: uppercase;
        font-size: 0.85rem;
        animation: pulse 2s ease-in-out infinite;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      @keyframes pulse {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; }
      }
    </style>
  </head>
  <body>
    <app-root>
      <div class="loading-container">
        <div class="loader">
          <div class="loader-circle"></div>
          <div class="loader-circle-inner"></div>
        </div>
        <div class="loader-text">Inicializando Sistemas...</div>
      </div>
    </app-root>
    <noscript>
      <div style="padding: 2rem; text-align: center; background: #0f172a; color: white; height: 100vh; display: flex; align-items: center; justify-content: center;">
        <p>Esta aplicação requer JavaScript habilitado para simular a indústria 4.0 em tempo real.</p>
      </div>
    </noscript>
  </body>
</html>
