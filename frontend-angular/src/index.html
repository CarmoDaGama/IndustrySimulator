<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <title>Simulador Industrial - Sistema de Produção</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Simulador de produção industrial com microsserviços, Kafka e Angular" />
    <meta name="theme-color" content="#2563eb" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <!-- Material Icons (used instead of emojis) -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script>
      if (typeof global === 'undefined') {
        var global = window;
      }
    </script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue',
          Arial, sans-serif;
        background: #f8faff;
      }

      app-root {
        display: block;
        width: 100%;
        height: 100%;
      }

      /* Loading spinner */
      .loading {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: #2563eb;
      }

      .spinner {
        border: 4px solid rgba(255, 255, 255, 0.3);
        border-top: 4px solid white;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <app-root></app-root>
    <noscript>
      <p>Esta aplicação requer JavaScript habilitado. Ative o JavaScript nas configurações do seu navegador.</p>
    </noscript>
  </body>
</html>
